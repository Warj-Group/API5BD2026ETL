name: ETL CI & SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - sprint-1
      - sprint-2
      - sprint-3
    types: [opened, synchronize, reopened]

jobs:
  ci:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Ajuste se estiver usando outra versão (ex: 3.11 ou 3.9)

      - name: Instalar Dependências e Linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Se você tiver um arquivo requirements.txt, descomente a linha abaixo:
          # pip install -r requirements.txt

      - name: Rodar Lint (Flake8)
        run: |
          # Falha o workflow se houver erros graves de sintaxe
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Alertas de formatação (não quebra o CI, mas mostra no log)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  sonarcloud:
    name: SonarCloud Scan
    needs: ci # Só roda se o Lint passar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        # Usando exatamente o mesmo Commit SHA que funcionou no Frontend!
        uses: SonarSource/sonarqube-scan-action@bfd4e558cda28cda6b5defafb9232d191be8c203
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}